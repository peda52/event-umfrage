<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>HFT Stuttgart – Gesundheitstag Feedback</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Google Font als moderner Kontrast -->
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;800&display=swap" rel="stylesheet" />

  <style>
    /* [Der komplette CSS-Code bleibt identisch wie im vorherigen HTML – hier abgekürzt für Kürze] */
    :root {
      --hft-orange: #e54511;
      --hft-orange-dark: #c23508;
      --hft-bg: #fdfaf7;
      --accent-tk: #00a8b0;
      --accent-soft: #f1f9fa;
      --text-dark: #262626;
      --text-muted: #7a7a7a;
      --success: #41b66e;
      --danger: #e8505b;
    }

    /* ... (vollständiger CSS wie zuvor) ... */
  </style>
</head>
<body>
  <!-- [Der vollständige HTML-Struktur-Code bleibt identisch wie zuvor] -->

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwmfMHZwoN52qNs1xTacjZtFr6blp-rIbuP5CROzJyn70yQyScMtSI1YkIDZJ7z7-LSIQ/exec";

    // ... (alle vorherigen JS-Funktionen bleiben identisch) ...

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      if (!validateCurrentStep()) return;

      const data = new FormData(form);
      
      // Zusätzliche Umfrage‑Metadaten hinzufügen
      data.append("timestamp", new Date().toISOString());
      data.append("event", "Gesundheitstag 22.04.2026");
      data.append("ort", "Bau 1 Aula, HFT Stuttgart");
      data.append("user_agent", navigator.userAgent);

      try {
        // POST an Google Apps Script
        const response = await fetch(SCRIPT_URL, {
          method: "POST",
          mode: "no-cors", // Wichtig für Google Apps Script
          body: data,
        });

        // Erfolgs‑Screen zeigen (da no-cors kein Response liest, direkt zu Thankyou)
        form.style.display = "none";
        thankYou.style.display = "block";
        progressFill.style.width = "100%";
        progressLabel.textContent = "✅ Übermittelt – vielen Dank!";
        funMessage.textContent = "Dein Feedback wurde erfolgreich an die HFT gespeichert.";
        
        // Konfetti‑Effekt für Spaß
        confettiEffect();
        
      } catch (error) {
        console.error("Fehler beim Senden:", error);
        // Fallback: Thankyou trotzdem zeigen, Admin wird Fehler sehen
        form.style.display = "none";
        thankYou.style.display = "block";
        thankYou.innerHTML = `
          <div class="emoji-burst">🎉💚</div>
          <h2>Danke für dein Feedback!</h2>
          <p>Es wurde gespeichert. Falls ein Fehler auftrat, siehst du ihn in den Browser‑Tools.</p>
        `;
      }
    });

    // Einfacher Konfetti‑Effekt für Spaß (ohne externe Libs)
    function confettiEffect() {
      const colors = ['#e54511', '#00a8b0', '#41b66e', '#ffd700', '#ff69b4'];
      
      for (let i = 0; i < 50; i++) {
        const confetti = document.createElement('div');
        confetti.style.position = 'fixed';
        confetti.style.left = Math.random() * 100 + 'vw';
        confetti.style.top = '-10px';
        confetti.style.width = '8px';
        confetti.style.height = '8px';
        confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.borderRadius = '50%';
        confetti.style.pointerEvents = 'none';
        confetti.style.zIndex = '1000';
        confetti.style.animation = `fall ${Math.random() * 3 + 2}s linear forwards`;
        document.body.appendChild(confetti);

        // CSS‑Animation inline
        const style = document.createElement('style');
        style.textContent = `
          @keyframes fall {
            to {
              transform: translateY(100vh) rotate(360deg);
              opacity: 0;
            }
          }
        `;
        document.head.appendChild(style);
        
        setTimeout(() => confetti.remove(), 5000);
      }
    }

    // ... (Rest des JS-Codes identisch) ...
  </script>
</body>
</html>
