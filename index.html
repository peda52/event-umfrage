<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>HFT Stuttgart – Dinosaurier-Quiz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;800&display=swap" rel="stylesheet" />

  <style>
    :root {
      /* HFT-CD nah nachempfunden: kräftiges Orange + Weiß, Akzent Türkis/Blau */
      --hft-orange: #e54511;
      --hft-orange-dark: #c23508;
      --hft-bg: #fdfaf7;
      --accent-tk: #00a8b0;
      --accent-soft: #f1f9fa;
      --text-dark: #262626;
      --text-muted: #7a7a7a;
      --success: #41b66e;
      --danger: #e8505b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: "Nunito", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: radial-gradient(circle at top left, #f7fff9 0, #fdfaf7 45%, #fff 100%);
      color: var(--text-dark);
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 1.5rem 1rem 2.5rem;
    }

    .card {
      width: 100%;
      max-width: 900px;
      background: #ffffffee;
      border-radius: 24px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.09);
      overflow: hidden;
      position: relative;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: -40%;
      background:
        radial-gradient(circle at 10% 0, rgba(0, 168, 176, 0.09), transparent 55%),
        radial-gradient(circle at 100% 10%, rgba(229, 69, 17, 0.12), transparent 55%);
      opacity: 0.9;
      pointer-events: none;
    }

    .card-inner {
      position: relative;
      z-index: 1;
      padding: 1.75rem 1.75rem 2.25rem;
    }

    header.survey-header {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }

    .logo-block {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .logo-mark {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      background: var(--hft-orange);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 800;
      font-size: 1.4rem;
      letter-spacing: -0.03em;
      box-shadow: 0 10px 24px rgba(229, 69, 17, 0.45);
    }

    .logo-text {
      font-weight: 800;
      color: var(--hft-orange);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-size: 0.8rem;
      line-height: 1.2;
    }

    .logo-text span {
      display: block;
    }

    .title-block {
      flex: 1;
      min-width: 230px;
    }

    .title-block h1 {
      margin: 0;
      font-size: clamp(1.6rem, 2.4vw, 2.1rem);
      line-height: 1.15;
      color: var(--text-dark);
    }

    .title-block p {
      margin: 0.35rem 0 0;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--accent-soft);
      color: var(--accent-tk);
      border-radius: 999px;
      padding: 0.35rem 0.9rem 0.4rem;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .pill-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent-tk);
      box-shadow: 0 0 0 4px rgba(0, 168, 176, 0.18);
    }

    .stepper {
      display: flex;
      align-items: center;
